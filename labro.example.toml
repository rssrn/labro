# labro.example.toml — copy this to your private config repo and rename it labro.toml.
#
# GitHub access (choose one):
#
#   OPTION A — GitHub App (recommended, bot identity):
#     Set these fields in labro.toml:
#       github_app_id   = 12345
#       github_app_name = "labro-yourusername"
#     Pass the private key PEM via env var (keep it out of this file):
#       GH_APP_PRIVATE_KEY    contents of the .pem file downloaded from GitHub
#     No GH_TOKEN needed — labro generates a per-run installation token automatically.
#
#   OPTION B — Personal access token (simpler setup):
#     GH_TOKEN                  GitHub PAT with repo + read:org scopes
#
# Agent auth (required for live runs, not dry-run):
#   CLAUDE_CODE_OAUTH_TOKEN   Claude subscription OAuth token (Pro/Max) — recommended
#                             Generate once with: claude setup-token
#   ANTHROPIC_API_KEY         Anthropic API key (alternative to OAuth token; untested)
#                             NOTE: if both are set, ANTHROPIC_API_KEY takes precedence
#
# Optional:
#   SLACK_WEBHOOK_URL         Required only if [digest] enabled = true
#   GRAFANA_TOKEN             Required only if any project uses a grafana-alerts source
#
# Config resolution pattern:
#   The labro binary and your labro.toml live in separate repos.
#   Point labro at your config with the --config flag or LABRO_CONFIG env var:
#     export LABRO_CONFIG=/path/to/your/config/repo/labro.toml
#     labro run <project> --dry-run
#
# ──────────────────────────────────────────────────────────────────────────────
# TWO STYLES
#
# Style A (below): personas + shared_rules — define prompt snippets and label
#   conventions once, reference them across many projects.
#
# Style B (further below): everything inline — no shared sections, good for
#   simple single-project setups.
# ──────────────────────────────────────────────────────────────────────────────


# ══════════════════════════════════════════════════════════════════════════════
# STYLE A — personas + shared_rules
# ══════════════════════════════════════════════════════════════════════════════

# ── Personas ───────────────────────────────────────────────────────────────────
# Named prompt snippets prepended to the agent role section.
# Reference them from any rule or source with  persona = "<name>".

[personas.senior-developer]
prompt = """
Act as a senior developer. If reasonably possible, raise a PR for this ticket.
If a PR is not reasonably possible (e.g. unclear or contradictory requirements),
post a comment asking questions. In your comment, namecheck an appropriate
person or people from the issue history.
"""

[personas.business-analyst]
prompt = """
Act as a business analyst. If the ticket describes a proposed feature or
change, evaluate its feasibility, risks, and fit with the existing architecture.
Post a comment structured as a short proposal with these sections:

**Summary** — one paragraph restating the proposal in your own words.
**Risks & concerns** — bullet list of technical or process risks.
**Open questions** — anything that needs clarification before work can start.
**Recommended approach** — your suggested next step (implement as-is, spike
first, reject, needs more detail, etc.) with a brief rationale.

Do not implement changes.
"""

[personas.frontline-support]
prompt = """
Act as a frontline support engineer. Your goal is rapid triage: classify the
alert severity, identify the most likely root cause from recent changes and
metrics, and create a GitHub issue with a clear summary, reproduction steps,
and suggested owner. If the alert is a known flap, note that and close it.
"""

[personas.architect]
prompt = """
Act as a software architect. Review the ticket for architectural implications:
identify coupling risks, boundary violations, scalability concerns, and
consistency with the existing design. Post a comment with your assessment and,
where relevant, a recommended approach or links to prior decisions. Do not
implement changes — your output is design guidance only.
"""

# ── Shared rules ───────────────────────────────────────────────────────────────
# Reusable label rule templates.  Projects reference them with  rule = "<name>".
# Any field can be overridden at the project level.

[shared_rules.dev]
label             = "ai-dev"
done_label        = "ai-dev-done"
persona           = "senior-developer"
permitted_actions = ["comment_on_issue", "open_pr"]
model             = "claude-code:anthropic/claude-opus-4-7@max"  # dev work warrants maximum reasoning

[shared_rules.ba]
label             = "ai-ba"
done_label        = "ai-ba-done"
persona           = "business-analyst"
permitted_actions = ["comment_on_issue"]

[shared_rules.architect]
label             = "ai-architect"
done_label        = "ai-architect-done"
persona           = "architect"
permitted_actions = ["comment_on_issue"]
model             = "claude-code:anthropic/claude-sonnet-4-6@medium"  # design review; lower effort sufficient

# ── GitHub App auth (recommended alternative to GH_TOKEN) ─────────────────────
# Both fields must be set together, or neither.
# Private key goes in GH_APP_PRIVATE_KEY env var — not here.
# When set, labro generates a per-run installation token; GH_TOKEN is not needed.

# github_app_id   = 12345
# github_app_name = "labro-yourusername"   # your app slug, no [bot] suffix

# ── Claude assignee (optional) ─────────────────────────────────────────────────
# GitHub login to assign to an issue/PR while Claude is working on it.
# Labro assigns this user before invoking the agent and restores the original
# assignee afterwards, regardless of outcome.  Useful as a "in progress" signal.
# When using GitHub App auth, set this to the bot username (with [bot] suffix).
# For PAT auth, set this to the user account you want shown as the assignee.
# Run `labro check` to verify the account has access to every repo.

# claude_assignee = "labro-yourusername[bot]"   # GitHub App (recommended)
# claude_assignee = "claude-code-youruser"       # PAT / dedicated user

# ── Digest ─────────────────────────────────────────────────────────────────────

[digest]
enabled = false
cron    = "0 8 * * *"

# ── Defaults ───────────────────────────────────────────────────────────────────

[defaults]
model        = "claude-code:anthropic/claude-opus-4-7@high"  # CLI-prefixed: <cli>[:<provider>/<model>][@<effort>]
max_turns    = 20
timeout_s    = 600
max_comments = 10

# ── Projects ───────────────────────────────────────────────────────────────────
#
# Task sources are evaluated top-to-bottom; the first source that finds an
# eligible item wins.  To interleave label rules with other source types, split
# them into separate gh-label blocks at the positions you want in the order.
#
# Example priority order: dev → grafana alerts → ba → architect

[[projects]]
name    = "my-api"
repo    = "owner/my-api"
cron    = "0 9 * * 1-5"
context = "Follow the coding conventions in CLAUDE.md closely."

# (1) dev label — highest priority; acted on before anything else
[[projects.task_sources]]
type = "gh-label"

[[projects.task_sources.label_rules]]
rule = "dev"

# (2) grafana alerts — only reached when no dev items are waiting
[[projects.task_sources]]
type         = "grafana-alerts"
min_severity = "warning"
persona      = "frontline-support"
permitted_actions = ["create_issue"]

# (3) ba label — lower priority than alerts
[[projects.task_sources]]
type = "gh-label"

[[projects.task_sources.label_rules]]
rule = "ba"

# (4) architect label — lowest priority label task
[[projects.task_sources]]
type = "gh-label"

[[projects.task_sources.label_rules]]
rule = "architect"

# (5) proactive improvement — fires when nothing else is queued.
#     Labro creates a GitHub issue and asks the agent to investigate from a
#     randomly selected perspective (defined in perspectives.toml).
#     Omit `perspectives` to draw from all defined perspectives.
[[projects.task_sources]]
type                 = "proactive-improvement"
max_open_suggestions = 3                          # skip if this many open ai-proactive-suggestion issues exist
perspectives         = ["red-team", "pre-mortem", "fresh-eyes", "10x-telescope"]
permitted_actions    = ["comment_on_issue", "open_pr"]

[[projects]]
name    = "another-service"
repo    = "owner/another-service"
cron    = "0 11 * * 1-5"

[[projects.task_sources]]
type         = "grafana-alerts"
min_severity = "critical"
persona      = "frontline-support"   # same persona reused across projects
permitted_actions = ["create_issue", "comment_on_issue"]


# ══════════════════════════════════════════════════════════════════════════════
# STYLE B — everything inline, no personas or shared_rules
# Remove this section and the Style A section above to use one or the other.
