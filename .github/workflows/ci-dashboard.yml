# .github/workflows/ci-dashboard.yml
# Runs TypeScript type-check and Vite build on PRs and pushes to main.
# Only triggers when dashboard/ files change.
# @author Claude Sonnet 4.6 Anthropic
on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
  pull_request:
    paths:
      - 'dashboard/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Test (vitest + axe)
        working-directory: dashboard
        run: npm test

      - name: Build (tsc + vite)
        working-directory: dashboard
        run: npm run build
