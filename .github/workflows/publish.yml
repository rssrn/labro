# .github/workflows/publish.yml
# Builds the production image (--target base) and pushes to GHCR on version tag push.
# Pin to a specific tag in deployments — :latest is not published (pin discipline).
# @author Claude Sonnet 4.6 Anthropic
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: base
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/rssrn/labro:${{ github.ref_name }}
