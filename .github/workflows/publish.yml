# .github/workflows/publish.yml
# Builds the production image (--target base) and pushes to GHCR on version tag push.
# Publishes both the versioned tag and :latest.
# @author Claude Sonnet 4.6 Anthropic
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/rssrn/labro
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          target: base
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "$(awk '/^## ${{ github.ref_name }}/{found=1; next} found && /^## /{exit} found{print}' CHANGELOG.md)"

      - name: Dispatch update to config repo
        env:
          TOKEN: ${{ secrets.CONFIG_REPO_DISPATCH_TOKEN }}
        run: |
          curl -fsSX POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/rssrn/labro-rssrn/dispatches \
            -d "{\"event_type\":\"labro-release\",\"client_payload\":{\"tag\":\"${{ github.ref_name }}\"}}"
