# .github/workflows/labro-restart.yml (in the config repo)
# Run manually (Actions → Run workflow) after updating a secret in /opt/labro/.env
# on the host, or to recover from a hung state.
#
# Required repo secrets:
#   TAILSCALE_AUTHKEY — ephemeral auth key from Tailscale admin (Actions → Keys)
#   DEPLOY_HOST       — user@hostname (Tailscale hostname), e.g. ubuntu@my-server
on:
  workflow_dispatch:

jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          args: --advertise-tags=tag:github-runner

      - name: Graceful restart
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            ${{ secrets.DEPLOY_HOST }} 'set -euo pipefail
            docker exec labro touch /data/LABRO_DISABLED
            # Wait up to 5 minutes for in-flight runs; guard against infinite loop
            # if the DB is missing or locked (query returns empty, not "0").
            deadline=$(($(date +%s) + 300))
            while [ "$(docker exec labro sqlite3 /data/labro.db \
                "SELECT COUNT(*) FROM project_locks" 2>/dev/null)" != "0" ]; do
              if [ "$(date +%s)" -ge "$deadline" ]; then
                echo "timed out waiting for locks; proceeding anyway"
                break
              fi
              echo "waiting..."; sleep 5
            done
            docker restart labro
            docker exec labro rm -f /data/LABRO_DISABLED
          '
